<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Github Issue Tracker</title>

    <!-- Tailwind & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <section class="bg-[#F8FAFC] flex justify-center items-center">
      <div class="bg-white w-lg mx-auto text-center my-8 p-8 rounded-xl">
        <img
          src="./assets/github-logo.png"
          alt="Github Logo"
          class="mx-auto pb-5"
        />
        <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
        <p class="text-l pb-4">Sign in to manage your issues</p>

        <fieldset class="fieldset">
          <label class="label text-xl text-black">Username</label>
          <input
            type="text"
            class="input w-full py-4 rounded-lg"
            placeholder="Enter Username"
            id="username"
          />
          <p class="text-[#4A00FF] text-start">Default: admin</p>

          <label class="label text-xl text-black">Password</label>
          <input
            type="password"
            class="input w-full py-4 rounded-lg"
            placeholder="Enter Password"
            id="password"
          />
          <p class="text-[#4A00FF] text-start">Default: admin123</p>
          <button
            onclick="loginSuccess()"
            class="btn btn-primary mt-4 py-1 rounded-s-lg"
          >
            Sign In
          </button>
        </fieldset>

    <script src="./scripts/loginScript.js"></script>
  </body>
</html>
